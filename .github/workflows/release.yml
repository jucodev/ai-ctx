name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # tags, release y push del CHANGELOG
  issues: write # comentarios de semantic-release/github
  pull-requests: write
  packages: write # publicar en GitHub Packages

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # semantic-release necesita todo el historial y los tags

      - uses: actions/setup-node@v4
        with:
          node-version: 24 # semantic-release requiere Node >=22.14; el paquete sigue soportando >=20 en runtime
          registry-url: https://npm.pkg.github.com

      - run: npm ci

      - run: npm run build # dist/ está en .gitignore; hay que construir antes de publicar

      - run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.GITHUB_TOKEN }}
